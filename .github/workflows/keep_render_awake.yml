name: Keep Render awake

on:
  schedule:
    # GitHub Actions cron minimum is 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keep-render-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ensure RENDER_URL is set
        run: |
          if [ -z "${RENDER_URL}" ]; then
            echo "Missing RENDER_URL. Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables -> New repository variable."
            echo "Example: https://your-service.onrender.com"
            exit 1
          fi
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}

      - name: Ping Render service
        run: |
          set -euo pipefail
          url="${RENDER_URL%/}/"
          echo "Pinging $url"
          curl -fsS --max-time 20 --retry 3 --retry-delay 2 --retry-connrefused "$url" >/dev/null
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
